services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:17
    container_name: dharma-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - dharma_db_data:/var/lib/postgresql/data
    networks:
      - dharma-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Database Migrations (draait automatisch vóór app bij elke deploy)
  # ---------------------------------------------------------------------------
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: dharma-migrate
    command: node_modules/.bin/prisma migrate deploy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      TZ: Europe/Amsterdam
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dharma-network
    restart: "no"

  # ---------------------------------------------------------------------------
  # Next.js Application
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dharma-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-53100}:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
      TZ: Europe/Amsterdam
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3000/api/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    networks:
      - dharma-network
    labels:
      - "homepage.group=Mijn Apps"
      - "homepage.name=Dharma Kalender"
      - "homepage.icon=calendar"
      - "homepage.href=http://10.0.0.30:53100"
      - "homepage.description=Sanatana Dharma Feestdagen"

  # ---------------------------------------------------------------------------
  # Seeder Service (eenmalig — gebruik: docker compose --profile seed run --rm seeder)
  # Draait op de builder stage zodat npm/tsx beschikbaar zijn.
  # Voorbeeld: npm run db:seed && npm run db:events && npm run db:occurrences -- --start 2026-01-01 --end 2029-12-31 --replace
  # ---------------------------------------------------------------------------
  seeder:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    profiles:
      - seed
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      TZ: Europe/Amsterdam
    entrypoint: ["sh"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dharma-network

  # ---------------------------------------------------------------------------
  # Backup Service (optioneel — gebruik: docker-compose --profile backup run backup)
  # ---------------------------------------------------------------------------
  backup:
    image: postgres:17
    container_name: dharma-backup
    profiles:
      - backup
    environment:
      PGHOST: db
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
    volumes:
      - ./backups:/backups
      - ./scripts/backup-db.sh:/backup-db.sh:ro
    entrypoint: ["/bin/sh", "/backup-db.sh"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dharma-network

volumes:
  dharma_db_data:

networks:
  dharma-network:
    driver: bridge
