services:
  db:
    image: postgres:17
    container_name: dharma-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - dharma_db_data:/var/lib/postgresql/data

volumes:
  dharma_db_data:
